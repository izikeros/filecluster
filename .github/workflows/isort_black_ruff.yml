name: uv, ruff, ty

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: |
          uv sync --group dev

      - name: Verify formatting with ruff
        run: |
          uv run ruff format --check src tests

      - name: Verify lint with ruff
        run: |
          uv run ruff check src tests

      - name: Type check with ty (non-blocking)
        continue-on-error: true
        run: |
          uv run ty check src

      - name: Run tests
        run: |
          uv run pytest tests
